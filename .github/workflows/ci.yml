name: CI & Auto Merge to Main

on:
  push:
    branches:
      - '**'
      - '!main'
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

jobs:
  lint-and-build:
    name: Lint & Build Frontend
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  auto-merge:
    name: Auto Merge to Main
    runs-on: ubuntu-latest
    needs: lint-and-build
    if: github.event_name == 'pull_request' && github.base_ref == 'main'

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Auto merge PR to main
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const pull_number = context.payload.pull_request.number;

            core.info(`Auto-merging PR #${pull_number} into main...`);

            await github.rest.pulls.merge({
              owner,
              repo,
              pull_number,
              merge_method: 'squash',
              commit_title: `${context.payload.pull_request.title} (#${pull_number})`,
              commit_message: context.payload.pull_request.body || '',
            });

            core.info(`PR #${pull_number} merged successfully.`);
